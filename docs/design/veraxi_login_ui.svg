<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Primary Gradient Orb -->
    <radialGradient id="orbGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0" />
    </radialGradient>
    
    <!-- Glass Panel Border -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05" />
    </linearGradient>

    <!-- Glass Panel Background -->
    <linearGradient id="glassBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.3" />
    </linearGradient>
    
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bgGradient)" />

  <!-- Orb Glow -->
  <circle cx="350" cy="200" r="400" fill="url(#orbGradient)" />

  <!-- Glass Panel (Login Card) -->
  <g transform="translate(520, 180)">
    <!-- Blur Base -->
    <rect width="400" height="520" rx="24" fill="#0F172A" opacity="0.3" />
    
    <!-- Glass Background -->
    <rect width="400" height="520" rx="24" fill="url(#glassBg)" filter="url(#glassBlur)" />
    
    <!-- Glass Border -->
    <rect width="400" height="520" rx="24" fill="none" stroke="url(#glassBorder)" stroke-width="1.5" />

    <!-- Icon (Triangle Logo) -->
    <polygon points="200,60 215,90 185,90" fill="none" stroke="#6366F1" stroke-width="3" />

    <!-- Title -->
    <text x="200" y="145" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="-0.5">Welcome Back</text>
    <text x="200" y="170" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Sign in to access your agents.</text>

    <!-- Email Field -->
    <g transform="translate(40, 210)">
      <rect width="320" height="50" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1" />
      <circle cx="25" cy="25" r="8" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <path d="M18 20 Q25 25 32 20" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <text x="50" y="30" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14">Email Address</text>
    </g>

    <!-- Password Field -->
    <g transform="translate(40, 280)">
      <rect width="320" height="50" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1" />
      <rect x="18" y="22" width="14" height="10" rx="2" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <path d="M20 22 V 17 A 5 5 0 0 1 30 17 V 22" fill="none" stroke="#94A3B8" stroke-width="1.5" />
      <text x="50" y="30" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14">Password</text>
    </g>

    <!-- Submit Button -->
    <g transform="translate(40, 360)">
      <rect width="320" height="56" rx="12" fill="#6366F1" />
      <text x="160" y="34" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Sign In</text>
    </g>

    <!-- Toggle Link -->
    <text x="200" y="450" fill="#94A3B8" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">Don't have an account? Sign up</text>
  </g>

  <!-- Back Button (Top Left) -->
  <g transform="translate(40, 40)">
    <path d="M20 10 L10 20 L20 30 M10 20 L30 20" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
