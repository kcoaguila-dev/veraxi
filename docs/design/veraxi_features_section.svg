<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" width="1440" height="600">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Primary Gradient Orb -->
    <radialGradient id="orbGradient1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orbGradient2" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0" />
    </radialGradient>
    
    <!-- Glass Panel Border -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02" />
    </linearGradient>

    <!-- Glass Panel Background -->
    <linearGradient id="glassBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.2" />
    </linearGradient>
    
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="600" fill="url(#bgGradient)" />

  <!-- Orb Glows -->
  <circle cx="288" cy="300" r="300" fill="url(#orbGradient1)" />
  <circle cx="1152" cy="300" r="300" fill="url(#orbGradient2)" />

  <!-- Section Title -->
  <text x="720" y="100" fill="#6366F1" font-family="Inter, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="2">CAPABILITIES</text>
  <text x="720" y="150" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" letter-spacing="-1">Everything your agents need to know.</text>
  <text x="720" y="190" fill="#94A3B8" font-family="Inter, sans-serif" font-size="18" text-anchor="middle">A unified intelligence layer designed for autonomous AI systems.</text>

  <!-- Cards Container -->
  <g transform="translate(170, 260)">
    
    <!-- Card 1: GraphRAG Synthesis -->
    <g transform="translate(0, 0)">
      <rect width="340" height="260" rx="16" fill="#0F172A" opacity="0.3" />
      <rect width="340" height="260" rx="16" fill="url(#glassBg)" filter="url(#glassBlur)" />
      <rect width="340" height="260" rx="16" fill="none" stroke="url(#glassBorder)" stroke-width="1.5" />
      
      <!-- Icon -->
      <circle cx="50" cy="50" r="24" fill="#6366F1" fill-opacity="0.1" />
      <path d="M40 40 L60 60 M60 40 L40 60" fill="none" stroke="#6366F1" stroke-width="2" />
      <circle cx="40" cy="40" r="4" fill="#6366F1" />
      <circle cx="60" cy="60" r="4" fill="#6366F1" />
      <circle cx="60" cy="40" r="4" fill="#6366F1" />
      <circle cx="40" cy="60" r="4" fill="#6366F1" />
      
      <text x="30" y="110" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="20" font-weight="bold">GraphRAG Synthesis</text>
      <text x="30" y="140" fill="#94A3B8" font-family="Inter, sans-serif" font-size="15" width="280">Extracts complex relationships and hierarchies from messy data using native Neo4j integration.</text>
    </g>

    <!-- Card 2: Semantic Search -->
    <g transform="translate(380, 0)">
      <rect width="340" height="260" rx="16" fill="#0F172A" opacity="0.3" />
      <rect width="340" height="260" rx="16" fill="url(#glassBg)" filter="url(#glassBlur)" />
      <rect width="340" height="260" rx="16" fill="none" stroke="url(#glassBorder)" stroke-width="1.5" />
      
      <!-- Icon -->
      <circle cx="50" cy="50" r="24" fill="#10B981" fill-opacity="0.1" />
      <circle cx="46" cy="46" r="8" fill="none" stroke="#10B981" stroke-width="2" />
      <path d="M52 52 L62 62" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" />
      
      <text x="30" y="110" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="20" font-weight="bold">Semantic Search</text>
      <text x="30" y="140" fill="#94A3B8" font-family="Inter, sans-serif" font-size="15" width="280">High-performance vector retrieval via Qdrant, enabling fuzzy matching and conceptual queries instantly.</text>
    </g>

    <!-- Card 3: Agent Agnostic -->
    <g transform="translate(760, 0)">
      <rect width="340" height="260" rx="16" fill="#0F172A" opacity="0.3" />
      <rect width="340" height="260" rx="16" fill="url(#glassBg)" filter="url(#glassBlur)" />
      <rect width="340" height="260" rx="16" fill="none" stroke="url(#glassBorder)" stroke-width="1.5" />
      
      <!-- Icon -->
      <circle cx="50" cy="50" r="24" fill="#EAB308" fill-opacity="0.1" />
      <rect x="40" y="42" width="20" height="16" rx="2" fill="none" stroke="#EAB308" stroke-width="2" />
      <path d="M44 38 L56 38" fill="none" stroke="#EAB308" stroke-width="2" />
      
      <text x="30" y="110" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="20" font-weight="bold">Universal Access</text>
      <text x="30" y="140" fill="#94A3B8" font-family="Inter, sans-serif" font-size="15" width="280">A standard MCP interface means Veraxi works out-of-the-box with Claude, Cursor, Copilot, and more.</text>
    </g>

  </g>
</svg>
